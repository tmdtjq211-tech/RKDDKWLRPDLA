<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>치즈 차는 강아지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            background-color: #e2e8f0;
        }
        canvas {
            image-rendering: pixelated;
        }
        .btn-control {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <!-- 메인 게임 컨테이너 -->
    <div class="relative w-full max-w-3xl bg-white shadow-xl rounded-2xl overflow-hidden border-4 border-yellow-500">
        
        <!-- 상단 UI -->
        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-10 pointer-events-none">
            <div class="flex gap-2">
                <div class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full font-bold text-xl text-indigo-600 shadow-md border border-indigo-300">
                    Lv.<span id="levelDisplay">1</span>
                </div>
                <div class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full font-bold text-xl text-yellow-600 shadow-md border border-yellow-300">
                    <span id="scoreDisplay">0</span> / 10
                </div>
            </div>
            <div class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full font-bold text-xl text-red-500 shadow-md border border-red-300">
                시간: <span id="timeDisplay">60</span>초
            </div>
        </div>

        <!-- 캔버스 -->
        <canvas id="gameCanvas" width="800" height="600" class="w-full h-auto bg-sky-200 block"></canvas>

        <!-- 시작/종료 화면 오버레이 -->
        <div id="overlay" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center z-20 text-white p-6 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-yellow-400 drop-shadow-md">🐕 디저트 차는 강아지 🍰</h1>
            <div class="bg-black/60 p-6 rounded-xl mb-6 max-w-md text-left leading-relaxed">
                <p class="mb-3 text-lg text-center text-yellow-200"><strong>[공중 디저트 받아먹기!]</strong></p>
                <ol class="list-decimal pl-5 space-y-3 text-sm md:text-base">
                    <li>왼쪽 벽에 있는 <strong>거대한 음식</strong>으로 다가가세요.</li>
                    <li>벽을 등지고 서서 (오른쪽 바라보기) <strong>Space(차기)</strong>를 누르면 뒷발로 벽을 찹니다!</li>
                    <li>충격으로 조각이 허공으로 떨어집니다.</li>
                    <li><strong>재빨리 몸을 돌려(왼쪽 바라보기)</strong> 떨어지는 음식을 입으로 받아먹으세요!</li>
                    <li><span class="text-sky-300">10개를 먹으면 다음 레벨로 넘어갑니다! (총 3단계)</span></li>
                </ol>
            </div>
            <button id="startBtn" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-3 px-10 rounded-full text-2xl transition-transform transform hover:scale-105 shadow-xl border-2 border-yellow-200">
                게임 시작!
            </button>
        </div>
    </div>

    <!-- 모바일 터치 컨트롤 -->
    <div class="w-full max-w-3xl flex justify-between items-end p-4 mt-2 md:hidden">
        <div class="grid grid-cols-3 gap-2 opacity-90">
            <div></div>
            <button id="btnUp" class="btn-control bg-gray-200 p-4 rounded-xl active:bg-gray-400 text-2xl shadow">⬆️</button>
            <div></div>
            <button id="btnLeft" class="btn-control bg-gray-200 p-4 rounded-xl active:bg-gray-400 text-2xl shadow">⬅️</button>
            <button id="btnDown" class="btn-control bg-gray-200 p-4 rounded-xl active:bg-gray-400 text-2xl shadow">⬇️</button>
            <button id="btnRight" class="btn-control bg-gray-200 p-4 rounded-xl active:bg-gray-400 text-2xl shadow">➡️</button>
        </div>
        <button id="btnDig" class="btn-control bg-yellow-400 text-yellow-900 font-extrabold p-6 rounded-full active:bg-yellow-600 text-xl shadow-xl border-4 border-yellow-600 transform transition-transform active:scale-95">
            차기!
        </button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelDisplay = document.getElementById('levelDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');

        // 오디오
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'kick') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'smash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        // 게임 변수
        let isPlaying = false;
        let level = 1; // 1: 노란치즈, 2: 파란치즈, 3: 케이크
        let score = 0;
        let timeLeft = 60;
        let gameTimer = null;
        let frameCount = 0;
        const groundY = 500; // 바닥 높이

        const keys = { up: false, down: false, left: false, right: false, kick: false };

        // 벽에 붙은 거대한 치즈
        const giantCheese = {
            x: 0,
            y: 100,
            w: 90,
            h: 400,
            shakeTimer: 0
        };

        const dog = {
            x: 200,
            y: groundY,
            vx: 0,
            vy: 0,
            speed: 6,
            jumpForce: -11,
            gravity: 0.5,
            facing: -1, // -1: 왼쪽, 1: 오른쪽
            isGrounded: true,
            kickCooldown: 0,
            radius: 20
        };

        let fallingCheeses = [];
        let particles = [];

        function resetGame() {
            score = 0;
            timeLeft = 60;
            dog.x = 300;
            dog.y = groundY;
            dog.vx = 0;
            dog.vy = 0;
            dog.facing = -1;
            fallingCheeses = [];
            particles = [];
            updateUI();
        }

        function startGame() {
            initAudio();
            level = 1; // 시작 시 레벨 초기화
            resetGame();
            isPlaying = true;
            overlay.classList.add('hidden');
            
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                if (timeLeft > 0) { timeLeft--; updateUI(); } 
                else { endGame(); }
            }, 1000);
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            overlay.classList.remove('hidden');
            overlay.innerHTML = `
                <h1 class="text-5xl font-extrabold mb-4 text-yellow-400 drop-shadow-md">시간 종료!</h1>
                <p class="text-2xl mb-6">최종 도달: <strong class="text-yellow-300 text-4xl">Lv.${level}</strong></p>
                <button id="restartBtn" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-3 px-10 rounded-full text-2xl transition-transform transform hover:scale-105 shadow-xl">
                    처음부터 다시 도전!
                </button>
            `;
            document.getElementById('restartBtn').addEventListener('click', startGame);
        }

        function handleLevelComplete() {
            isPlaying = false;
            clearInterval(gameTimer);
            
            if (level >= 3) {
                // 게임 최종 클리어
                overlay.classList.remove('hidden');
                overlay.innerHTML = `
                    <h1 class="text-5xl font-extrabold mb-4 text-pink-400 drop-shadow-md">🎉 게임 클리어! 🎉</h1>
                    <p class="text-2xl mb-6 font-bold text-white">노란치즈, 파란치즈, 케이크까지 모두 먹었어요!</p>
                    <button id="restartBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-10 rounded-full text-2xl transition-transform transform hover:scale-105 shadow-xl border-2 border-pink-300">
                        처음부터 다시 플레이
                    </button>
                `;
                document.getElementById('restartBtn').addEventListener('click', startGame);
            } else {
                // 다음 레벨로 진행
                level++;
                overlay.classList.remove('hidden');
                let nextName = level === 2 ? '파란 치즈 🧊' : '케이크 🍰';
                let nextColor = level === 2 ? 'text-blue-400' : 'text-pink-400';
                overlay.innerHTML = `
                    <h1 class="text-5xl font-extrabold mb-4 ${nextColor} drop-shadow-md">레벨 ${level} 달성!</h1>
                    <p class="text-2xl mb-6 font-bold text-white">${nextName} 단계 시작!</p>
                    <p class="text-md mb-6 text-gray-300">시간이 60초로 다시 초기화됩니다.</p>
                    <button id="nextLevelBtn" class="bg-white hover:bg-gray-100 text-gray-900 font-bold py-3 px-10 rounded-full text-2xl transition-transform transform hover:scale-105 shadow-xl border-4 border-gray-300">
                        다음 단계 시작!
                    </button>
                `;
                document.getElementById('nextLevelBtn').addEventListener('click', () => {
                    resetGame();
                    isPlaying = true;
                    overlay.classList.add('hidden');
                    gameTimer = setInterval(() => {
                        if (timeLeft > 0) { timeLeft--; updateUI(); } 
                        else { endGame(); }
                    }, 1000);
                });
            }
        }

        function updateUI() {
            levelDisplay.innerText = level;
            scoreDisplay.innerText = score;
            timeDisplay.innerText = timeLeft;
        }

        // 키보드 세팅
        window.addEventListener('keydown', (e) => {
            if(['ArrowUp', 'KeyW'].includes(e.code)) keys.up = true;
            if(['ArrowDown', 'KeyS'].includes(e.code)) keys.down = true;
            if(['ArrowLeft', 'KeyA'].includes(e.code)) keys.left = true;
            if(['ArrowRight', 'KeyD'].includes(e.code)) keys.right = true;
            if(e.code === 'Space') { keys.kick = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if(['ArrowUp', 'KeyW'].includes(e.code)) keys.up = false;
            if(['ArrowDown', 'KeyS'].includes(e.code)) keys.down = false;
            if(['ArrowLeft', 'KeyA'].includes(e.code)) keys.left = false;
            if(['ArrowRight', 'KeyD'].includes(e.code)) keys.right = false;
            if(e.code === 'Space') keys.kick = false;
        });

        // 모바일 버튼 세팅
        const bindButton = (id, keyName) => {
            const btn = document.getElementById(id);
            if(!btn) return;
            const press = (e) => { keys[keyName] = true; e.preventDefault(); };
            const release = (e) => { keys[keyName] = false; e.preventDefault(); };
            btn.addEventListener('touchstart', press); btn.addEventListener('mousedown', press);
            btn.addEventListener('touchend', release); btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        };
        bindButton('btnUp', 'up'); bindButton('btnDown', 'down');
        bindButton('btnLeft', 'left'); bindButton('btnRight', 'right');
        bindButton('btnDig', 'kick');

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 1) * 8,
                    life: 25 + Math.random() * 10,
                    color: color
                });
            }
        }

        function update() {
            // 강아지 좌우 이동
            if (keys.left) { dog.vx = -dog.speed; dog.facing = -1; }
            else if (keys.right) { dog.vx = dog.speed; dog.facing = 1; }
            else { dog.vx = 0; }

            // 강아지 점프 (바닥에 있을 때만)
            if (keys.up && dog.isGrounded) {
                dog.vy = dog.jumpForce;
                dog.isGrounded = false;
            }

            // 강아지 중력 및 위치 적용
            dog.vy += dog.gravity;
            dog.x += dog.vx;
            dog.y += dog.vy;

            // 바닥 충돌
            if (dog.y >= groundY) {
                dog.y = groundY;
                dog.vy = 0;
                dog.isGrounded = true;
            }

            // 벽 충돌 (왼쪽 거대 치즈, 오른쪽 화면 끝)
            if (dog.x < giantCheese.w + 25) dog.x = giantCheese.w + 25;
            if (dog.x > canvas.width - 25) dog.x = canvas.width - 25;

            // 머리와 꼬리 위치 계산 (이모지 🐕 기준)
            const headX = dog.x + (dog.facing * 30);
            const headY = dog.y - 15;
            const tailX = dog.x - (dog.facing * 30);
            const tailY = dog.y - 5;

            // 발차기 (벽의 치즈 차기)
            if (dog.kickCooldown > 0) dog.kickCooldown--;
            if (keys.kick && dog.kickCooldown <= 0) {
                // 강아지가 거대 치즈 근처에 있고, 오른쪽(1)을 보고 있어야 엉덩이가 치즈를 향함
                if (dog.x < giantCheese.w + 60 && dog.facing === 1) {
                    playSound('kick');
                    dog.kickCooldown = 30; // 킥 쿨타임
                    giantCheese.shakeTimer = 15; // 치즈 흔들림 이펙트

                    // 치즈 파편 떨어뜨리기
                    fallingCheeses.push({
                        x: giantCheese.w + 10,
                        y: dog.y - 120 + (Math.random() * 40), // 차는 위치보다 살짝 위에서 떨어짐
                        vx: 1 + Math.random() * 1.5, // 멀리 가지 않고 강아지 바로 뒤쪽 가까이 떨어지게 수정
                        vy: -10 - Math.random() * 5, // 공중으로 훨씬 높이 튀어오름 (유지)
                        radius: 12
                    });

                    // 차는 순간 파티클
                    let kickColor = level === 1 ? '#FCD34D' : (level === 2 ? '#93C5FD' : '#F9A8D4');
                    createParticles(giantCheese.w, tailY, kickColor, 5);
                }
            }

            // 떨어지는 치즈 업데이트 및 충돌 검사
            for (let i = fallingCheeses.length - 1; i >= 0; i--) {
                const c = fallingCheeses[i];
                c.vy += 0.2; // 치즈의 중력 (조금 천천히 떨어짐)
                c.x += c.vx;
                c.y += c.vy;

                // 1. 입(머리)으로 받아먹었는지 검사
                const distToHead = Math.hypot(headX - c.x, headY - c.y);
                // 반드시 왼쪽(-1)을 보고 있어야(돌아섰을 때) 먹을 수 있도록 조건 추가
                if (distToHead < c.radius + 25 && dog.facing === -1) {
                    playSound('eat');
                    score++;
                    updateUI();
                    let particleColor = level === 1 ? '#FFD700' : (level === 2 ? '#60A5FA' : '#F472B6');
                    createParticles(c.x, c.y, particleColor, 10); // 반짝이
                    fallingCheeses.splice(i, 1);
                    
                    if (score >= 10) {
                        handleLevelComplete();
                    }
                    continue;
                }

                // 2. 바닥에 떨어져 부서졌는지 검사
                if (c.y >= groundY + 10) {
                    playSound('smash');
                    let smashColor = level === 1 ? '#FBBF24' : (level === 2 ? '#3B82F6' : '#FBCFE8');
                    createParticles(c.x, groundY + 10, smashColor, 8); // 부서지는 파티클
                    fallingCheeses.splice(i, 1);
                }
            }

            // 파티클 업데이트
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            if (giantCheese.shakeTimer > 0) giantCheese.shakeTimer--;
            frameCount++;
        }

        function draw() {
            // 배경 그리기 (하늘)
            ctx.fillStyle = '#bae6fd'; // sky-200
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 구름 장식
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(200 + (frameCount*0.2)%800, 100, 40, 0, Math.PI*2);
            ctx.arc(240 + (frameCount*0.2)%800, 100, 50, 0, Math.PI*2);
            ctx.arc(280 + (frameCount*0.2)%800, 120, 30, 0, Math.PI*2);
            ctx.fill();

            // 바닥 그리기
            ctx.fillStyle = '#4ade80'; // 잔디색
            ctx.fillRect(0, groundY + 10, canvas.width, canvas.height - groundY);
            ctx.fillStyle = '#16a34a';
            ctx.fillRect(0, groundY + 10, canvas.width, 10); // 바닥 윗선

            // 거대한 벽 그리기 (레벨별로 모습 다름)
            ctx.save();
            let cheeseShakeX = 0;
            if (giantCheese.shakeTimer > 0) {
                cheeseShakeX = (Math.random() - 0.5) * 8; // 타격 시 흔들림
            }
            
            if (level === 1) {
                // 1단계: 노란 치즈
                ctx.fillStyle = '#FBBF24';
                ctx.fillRect(giantCheese.x + cheeseShakeX, giantCheese.y, giantCheese.w, giantCheese.h);
                ctx.fillStyle = '#D97706';
                const holes = [[20, 150, 15], [50, 220, 25], [25, 310, 20], [60, 380, 15], [30, 450, 22]];
                holes.forEach(h => {
                    ctx.beginPath(); ctx.arc(giantCheese.x + cheeseShakeX + h[0], h[1], h[2], 0, Math.PI*2); ctx.fill();
                });
            } else if (level === 2) {
                // 2단계: 파란 치즈
                ctx.fillStyle = '#60A5FA'; 
                ctx.fillRect(giantCheese.x + cheeseShakeX, giantCheese.y, giantCheese.w, giantCheese.h);
                ctx.fillStyle = '#1E3A8A';
                const holes = [[20, 150, 15], [50, 220, 25], [25, 310, 20], [60, 380, 15], [30, 450, 22]];
                holes.forEach(h => {
                    ctx.beginPath(); ctx.arc(giantCheese.x + cheeseShakeX + h[0], h[1], h[2], 0, Math.PI*2); ctx.fill();
                });
            } else if (level === 3) {
                // 3단계: 핑크 케이크
                ctx.fillStyle = '#FBCFE8'; // 연핑크 (케이크 빵)
                ctx.fillRect(giantCheese.x + cheeseShakeX, giantCheese.y, giantCheese.w, giantCheese.h);
                ctx.fillStyle = '#F472B6'; // 진핑크 (케이크 크림)
                for(let i=0; i<5; i++) {
                    ctx.fillRect(giantCheese.x + cheeseShakeX, giantCheese.y + 50 + i*80, giantCheese.w, 20);
                }
            }
            ctx.restore();

            // 떨어지는 음식들 그리기
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            fallingCheeses.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(frameCount * 0.1); // 빙글빙글 회전하며 떨어짐
                
                if (level === 1) {
                    ctx.fillText('🧀', 0, 0);
                } else if (level === 2) {
                    ctx.filter = 'hue-rotate(180deg)'; // 노란색 -> 파란색 계열로 변환
                    ctx.fillText('🧀', 0, 0);
                    ctx.filter = 'none';
                } else if (level === 3) {
                    ctx.fillText('🍰', 0, 0);
                }
                
                ctx.restore();
            });

            // 강아지 그리기
            ctx.save();
            ctx.translate(dog.x, dog.y);
            
            // 점프나 차기 중일 때 애니메이션
            if (!dog.isGrounded) {
                ctx.rotate(dog.facing * -0.2); // 점프 시 살짝 들림
            } else if (dog.kickCooldown > 20) {
                ctx.rotate(dog.facing * 0.3); // 발차기 액션 (뒤로 기울어짐)
            } else if (Math.abs(dog.vx) > 0) {
                // 걷기 애니메이션 (위아래로 뜀)
                ctx.translate(0, Math.sin(frameCount * 0.5) * 3);
            }

            if (dog.facing === 1) ctx.scale(-1, 1); // 방향 반전

            ctx.font = '60px Arial';
            ctx.textAlign = 'center';
            // 이모지는 바닥(y=0) 기준 위로 올라가도록 설정
            ctx.fillText('🐕', 0, 10); 
            ctx.restore();

            // 파티클 그리기
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 35;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            /* 디버깅용 히트박스 확인 (필요시 주석 해제)
            ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'; // 머리(입) 판정
            ctx.beginPath(); ctx.arc(dog.x + (dog.facing * 30), dog.y - 15, 25, 0, Math.PI*2); ctx.fill();
            */
        }

        function gameLoop() {
            if (!isPlaying) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
