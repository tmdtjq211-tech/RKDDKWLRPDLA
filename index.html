<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>치즈 차는 강아지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            background-color: #e2e8f0;
        }
        canvas {
            image-rendering: pixelated;
        }
        .btn-control {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <!-- 메인 게임 컨테이너 -->
    <div class="relative w-full max-w-3xl bg-white shadow-xl rounded-2xl overflow-hidden border-4 border-yellow-500 flex-shrink-0">
        
        <!-- 상단 UI (모바일에서 텍스트와 패딩 축소) -->
        <div class="absolute top-0 left-0 w-full p-2 sm:p-4 flex justify-between items-center z-10 pointer-events-none">
            <div class="flex gap-1 sm:gap-2">
                <div class="bg-white/90 backdrop-blur-sm px-2 py-1 sm:px-4 sm:py-2 rounded-full font-bold text-sm sm:text-xl text-indigo-600 shadow-md border border-indigo-300">
                    Lv.<span id="levelDisplay">1</span>
                </div>
                <div class="bg-white/90 backdrop-blur-sm px-2 py-1 sm:px-4 sm:py-2 rounded-full font-bold text-sm sm:text-xl text-yellow-600 shadow-md border border-yellow-300">
                    <span id="scoreDisplay">0</span> / 10
                </div>
            </div>
            <div class="bg-white/90 backdrop-blur-sm px-2 py-1 sm:px-4 sm:py-2 rounded-full font-bold text-sm sm:text-xl text-red-500 shadow-md border border-red-300">
                시간: <span id="timeDisplay">60</span>초
            </div>
        </div>

        <!-- 캔버스 -->
        <canvas id="gameCanvas" width="800" height="600" class="w-full h-auto bg-sky-200 block"></canvas>

        <!-- 전체 오버레이 (스크롤 가능하게 처리하고 뒷배경 깔끔하게 가림) -->
        <div id="overlay" class="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-20 text-white p-4 sm:p-6 text-center overflow-y-auto">
            
            <!-- 1. 메인 메뉴 화면 -->
            <div id="mainMenu" class="flex flex-col items-center w-full my-auto">
                <h1 class="text-2xl sm:text-4xl md:text-6xl font-extrabold mb-4 sm:mb-8 text-yellow-400 drop-shadow-md leading-tight">🐕 디저트 차는 강아지 🍰</h1>
                <div class="flex flex-col gap-3 sm:gap-4 w-full max-w-[200px] sm:max-w-xs">
                    <button id="btnStart" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-2 px-6 sm:py-4 sm:px-8 rounded-full text-lg sm:text-2xl transition-transform transform hover:scale-105 shadow-xl border-2 border-yellow-200">
                        게임시작
                    </button>
                    <button id="btnHowTo" class="bg-sky-400 hover:bg-sky-500 text-white font-bold py-2 px-6 sm:py-3 sm:px-8 rounded-full text-base sm:text-xl transition-transform transform hover:scale-105 shadow-xl border-2 border-sky-200">
                        게임방법
                    </button>
                    <button id="btnRecord" class="bg-pink-400 hover:bg-pink-500 text-white font-bold py-2 px-6 sm:py-3 sm:px-8 rounded-full text-base sm:text-xl transition-transform transform hover:scale-105 shadow-xl border-2 border-pink-200">
                        기록
                    </button>
                </div>
            </div>

            <!-- 2. 게임 방법 화면 -->
            <div id="howToMenu" class="hidden flex flex-col items-center w-full my-auto">
                <h2 class="text-2xl sm:text-3xl font-extrabold mb-3 sm:mb-4 text-sky-300">📖 게임 방법</h2>
                <div class="bg-black/60 p-4 sm:p-6 rounded-xl mb-4 sm:mb-6 max-w-md text-left leading-relaxed w-full">
                    <p class="mb-2 text-base sm:text-lg text-center text-yellow-200"><strong>[공중 디저트 받아먹기!]</strong></p>
                    <ol class="list-decimal pl-5 space-y-1 sm:space-y-3 text-xs sm:text-base">
                        <li>벽에 있는 <strong>거대한 음식</strong>으로 다가가세요.</li>
                        <li>벽을 등지고 (오른쪽 보기) <strong>차기!</strong> 버튼을 누르세요.</li>
                        <li>조각이 허공으로 떨어집니다.</li>
                        <li><strong>재빨리 몸을 돌려(왼쪽 보기)</strong> 입으로 받아먹으세요!</li>
                        <li><span class="text-sky-300">단계별로 10개를 먹으면 통과! (총 3단계)</span></li>
                    </ol>
                </div>
                <button id="btnBackFromHowTo" class="bg-gray-300 hover:bg-gray-400 text-gray-900 font-bold py-2 px-6 sm:py-3 sm:px-10 rounded-full text-base sm:text-xl transition-transform transform hover:scale-105 shadow-xl">
                    뒤로 가기
                </button>
            </div>

            <!-- 3. 기록 화면 -->
            <div id="recordMenu" class="hidden flex flex-col items-center w-full my-auto">
                <h2 class="text-2xl sm:text-3xl font-extrabold mb-4 sm:mb-6 text-pink-300">🏆 최고 기록</h2>
                <div class="bg-black/60 p-6 sm:p-8 rounded-xl mb-4 sm:mb-8 max-w-sm w-full text-center">
                    <p class="text-sm sm:text-xl text-gray-300 mb-2">내가 먹은 가장 많은 디저트</p>
                    <p class="text-4xl sm:text-6xl font-black text-yellow-400 drop-shadow-lg"><span id="bestScoreText">0</span><span class="text-2xl sm:text-3xl text-white ml-2">개</span></p>
                    <p id="clearBadge" class="mt-4 text-pink-400 font-bold text-sm sm:text-lg hidden">🎉 ALL CLEAR 마스터! 🎉</p>
                </div>
                <button id="btnBackFromRecord" class="bg-gray-300 hover:bg-gray-400 text-gray-900 font-bold py-2 px-6 sm:py-3 sm:px-10 rounded-full text-base sm:text-xl transition-transform transform hover:scale-105 shadow-xl">
                    뒤로 가기
                </button>
            </div>

            <!-- 4. 게임 결과 화면 (동적으로 내용 변경됨) -->
            <div id="resultMenu" class="hidden flex flex-col items-center w-full my-auto">
                <!-- JS에서 채워짐 -->
            </div>

        </div>
    </div>

    <!-- 모바일 터치 컨트롤 (여백 및 버튼 크기 조정) -->
    <div class="w-full max-w-3xl flex justify-between items-end p-2 sm:p-4 mt-1 md:hidden">
        <div class="grid grid-cols-3 gap-1 sm:gap-2 opacity-90">
            <div></div>
            <button id="btnUp" class="btn-control bg-gray-200 p-3 sm:p-4 rounded-xl active:bg-gray-400 text-xl sm:text-2xl shadow">⬆️</button>
            <div></div>
            <button id="btnLeft" class="btn-control bg-gray-200 p-3 sm:p-4 rounded-xl active:bg-gray-400 text-xl sm:text-2xl shadow">⬅️</button>
            <button id="btnDown" class="btn-control bg-gray-200 p-3 sm:p-4 rounded-xl active:bg-gray-400 text-xl sm:text-2xl shadow">⬇️</button>
            <button id="btnRight" class="btn-control bg-gray-200 p-3 sm:p-4 rounded-xl active:bg-gray-400 text-xl sm:text-2xl shadow">➡️</button>
        </div>
        <button id="btnDig" class="btn-control bg-yellow-400 text-yellow-900 font-extrabold p-5 sm:p-6 rounded-full active:bg-yellow-600 text-lg sm:text-xl shadow-xl border-4 border-yellow-600 transform transition-transform active:scale-95">
            차기!
        </button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelDisplay = document.getElementById('levelDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const overlay = document.getElementById('overlay');
        
        // 메뉴 컨테이너들
        const mainMenu = document.getElementById('mainMenu');
        const howToMenu = document.getElementById('howToMenu');
        const recordMenu = document.getElementById('recordMenu');
        const resultMenu = document.getElementById('resultMenu');

        // 오디오
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'kick') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'smash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'levelup') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(800, now + 0.2);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        // 게임 변수
        let isPlaying = false;
        let level = 1; 
        let currentLevelScore = 0; 
        let totalScore = 0; 
        let timeLeft = 60;
        let gameTimer = null;
        let frameCount = 0;
        const groundY = 500;

        const keys = { up: false, down: false, left: false, right: false, kick: false };

        const giantCheese = { x: 0, y: 100, w: 90, h: 400, shakeTimer: 0 };

        const dog = {
            x: 300, y: groundY, vx: 0, vy: 0, speed: 6, jumpForce: -11,
            gravity: 0.5, facing: -1, isGrounded: true, kickCooldown: 0, radius: 20
        };

        let fallingCheeses = [];
        let particles = [];

        // 메뉴 전환
        function hideAllMenus() {
            mainMenu.classList.add('hidden');
            howToMenu.classList.add('hidden');
            recordMenu.classList.add('hidden');
            resultMenu.classList.add('hidden');
        }

        function showMainMenu() {
            hideAllMenus();
            overlay.classList.remove('hidden');
            mainMenu.classList.remove('hidden');
        }

        function saveRecord() {
            const best = parseInt(localStorage.getItem('dogGameBestScore') || '0');
            if (totalScore > best) {
                localStorage.setItem('dogGameBestScore', totalScore);
            }
        }

        function loadRecord() {
            const best = parseInt(localStorage.getItem('dogGameBestScore') || '0');
            document.getElementById('bestScoreText').innerText = best;
            if (best >= 30) {
                document.getElementById('clearBadge').classList.remove('hidden');
            } else {
                document.getElementById('clearBadge').classList.add('hidden');
            }
        }

        document.getElementById('btnStart').addEventListener('click', () => {
            level = 1; totalScore = 0; startGame();
        });

        document.getElementById('btnHowTo').addEventListener('click', () => {
            hideAllMenus(); howToMenu.classList.remove('hidden');
        });

        document.getElementById('btnRecord').addEventListener('click', () => {
            loadRecord(); hideAllMenus(); recordMenu.classList.remove('hidden');
        });

        document.getElementById('btnBackFromHowTo').addEventListener('click', showMainMenu);
        document.getElementById('btnBackFromRecord').addEventListener('click', showMainMenu);

        function resetGameData() {
            currentLevelScore = 0; timeLeft = 60;
            dog.x = 300; dog.y = groundY; dog.vx = 0; dog.vy = 0; dog.facing = -1;
            fallingCheeses = []; particles = [];
            updateUI();
        }

        function startGame() {
            initAudio(); resetGameData();
            isPlaying = true; hideAllMenus(); overlay.classList.add('hidden');
            
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                if (timeLeft > 0) { timeLeft--; updateUI(); } 
                else { endGame(); }
            }, 1000);
            
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isPlaying = false; clearInterval(gameTimer); saveRecord();
            hideAllMenus(); overlay.classList.remove('hidden'); resultMenu.classList.remove('hidden');
            
            // 모바일을 고려하여 텍스트 크기 반응형 적용 (text-3xl sm:text-5xl 등)
            resultMenu.innerHTML = `
                <h1 class="text-3xl sm:text-5xl font-extrabold mb-2 sm:mb-4 text-red-500 drop-shadow-md">시간 종료!</h1>
                <p class="text-lg sm:text-2xl mb-2">최종 도달: <strong class="text-yellow-300 text-2xl sm:text-3xl">Lv.${level}</strong></p>
                <p class="text-base sm:text-xl mb-6 sm:mb-8 text-gray-200">총 획득 디저트: ${totalScore}개</p>
                <div class="flex gap-2 sm:gap-4">
                    <button id="btnRestartGame" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-2 sm:py-3 px-4 sm:px-8 rounded-full text-base sm:text-xl transition-transform transform hover:scale-105 shadow-xl">
                        다시하기
                    </button>
                    <button id="btnGoHome" class="bg-white hover:bg-gray-200 text-gray-900 font-bold py-2 sm:py-3 px-4 sm:px-8 rounded-full text-base sm:text-xl transition-transform transform hover:scale-105 shadow-xl">
                        메뉴로
                    </button>
                </div>
            `;
            
            document.getElementById('btnRestartGame').addEventListener('click', () => { level = 1; totalScore = 0; startGame(); });
            document.getElementById('btnGoHome').addEventListener('click', showMainMenu);
        }

        function handleLevelComplete() {
            isPlaying = false; clearInterval(gameTimer); playSound('levelup'); saveRecord();
            hideAllMenus(); overlay.classList.remove('hidden'); resultMenu.classList.remove('hidden');

            if (level >= 3) {
                resultMenu.innerHTML = `
                    <h1 class="text-3xl sm:text-5xl font-extrabold mb-2 sm:mb-4 text-pink-400 drop-shadow-md">🎉 ALL CLEAR! 🎉</h1>
                    <p class="text-base sm:text-2xl mb-6 font-bold text-white">축하합니다! 모든 디저트를 정복했어요!</p>
                    <div class="flex gap-2 sm:gap-4">
                        <button id="btnRestartGame" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-2 sm:py-3 px-4 sm:px-8 rounded-full text-base sm:text-xl transition-transform transform hover:scale-105 shadow-xl">
                            다시하기
                        </button>
                        <button id="btnGoHome" class="bg-white hover:bg-gray-200 text-gray-900 font-bold py-2 sm:py-3 px-4 sm:px-8 rounded-full text-base sm:text-xl transition-transform transform hover:scale-105 shadow-xl">
                            메뉴로
                        </button>
                    </div>
                `;
            } else {
                level++;
                let nextName = level === 2 ? '파란 치즈 🧊' : '달콤한 케이크 🍰';
                let nextColor = level === 2 ? 'text-blue-400' : 'text-pink-400';
                resultMenu.innerHTML = `
                    <h1 class="text-3xl sm:text-5xl font-extrabold mb-2 sm:mb-4 ${nextColor} drop-shadow-md">레벨 ${level-1} 클리어!</h1>
                    <p class="text-lg sm:text-2xl mb-2 sm:mb-6 font-bold text-white">다음은 ${nextName} 입니다!</p>
                    <p class="text-sm sm:text-md mb-4 sm:mb-6 text-gray-300">시간이 60초로 다시 초기화됩니다.</p>
                    <button id="btnNextLevel" class="bg-white hover:bg-gray-200 text-gray-900 font-bold py-2 sm:py-3 px-6 sm:px-10 rounded-full text-lg sm:text-2xl transition-transform transform hover:scale-105 shadow-xl border-4 border-gray-300">
                        다음 단계 시작!
                    </button>
                `;
                document.getElementById('btnNextLevel').addEventListener('click', startGame);
            }

            const btnRestart = document.getElementById('btnRestartGame');
            const btnHome = document.getElementById('btnGoHome');
            if(btnRestart) btnRestart.addEventListener('click', () => { level = 1; totalScore = 0; startGame(); });
            if(btnHome) btnHome.addEventListener('click', showMainMenu);
        }

        function updateUI() {
            levelDisplay.innerText = level;
            scoreDisplay.innerText = currentLevelScore;
            timeDisplay.innerText = timeLeft;
        }

        // 키보드 및 버튼 세팅
        window.addEventListener('keydown', (e) => {
            if(['ArrowUp', 'KeyW'].includes(e.code)) keys.up = true;
            if(['ArrowDown', 'KeyS'].includes(e.code)) keys.down = true;
            if(['ArrowLeft', 'KeyA'].includes(e.code)) keys.left = true;
            if(['ArrowRight', 'KeyD'].includes(e.code)) keys.right = true;
            if(e.code === 'Space') { keys.kick = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if(['ArrowUp', 'KeyW'].includes(e.code)) keys.up = false;
            if(['ArrowDown', 'KeyS'].includes(e.code)) keys.down = false;
            if(['ArrowLeft', 'KeyA'].includes(e.code)) keys.left = false;
            if(['ArrowRight', 'KeyD'].includes(e.code)) keys.right = false;
            if(e.code === 'Space') keys.kick = false;
        });

        const bindButton = (id, keyName) => {
            const btn = document.getElementById(id);
            if(!btn) return;
            const press = (e) => { keys[keyName] = true; e.preventDefault(); };
            const release = (e) => { keys[keyName] = false; e.preventDefault(); };
            btn.addEventListener('touchstart', press); btn.addEventListener('mousedown', press);
            btn.addEventListener('touchend', release); btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        };
        bindButton('btnUp', 'up'); bindButton('btnDown', 'down');
        bindButton('btnLeft', 'left'); bindButton('btnRight', 'right');
        bindButton('btnDig', 'kick');

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 1) * 8,
                    life: 25 + Math.random() * 10, color: color
                });
            }
        }

        function update() {
            if (!isPlaying) return;

            if (keys.left) { dog.vx = -dog.speed; dog.facing = -1; }
            else if (keys.right) { dog.vx = dog.speed; dog.facing = 1; }
            else { dog.vx = 0; }

            if (keys.up && dog.isGrounded) { dog.vy = dog.jumpForce; dog.isGrounded = false; }

            dog.vy += dog.gravity; dog.x += dog.vx; dog.y += dog.vy;

            if (dog.y >= groundY) { dog.y = groundY; dog.vy = 0; dog.isGrounded = true; }
            if (dog.x < giantCheese.w + 25) dog.x = giantCheese.w + 25;
            if (dog.x > canvas.width - 25) dog.x = canvas.width - 25;

            const headX = dog.x + (dog.facing * 30);
            const headY = dog.y - 15;
            const tailY = dog.y - 5;

            if (dog.kickCooldown > 0) dog.kickCooldown--;
            if (keys.kick && dog.kickCooldown <= 0) {
                if (dog.x < giantCheese.w + 60 && dog.facing === 1) {
                    playSound('kick'); dog.kickCooldown = 30; giantCheese.shakeTimer = 15;

                    fallingCheeses.push({
                        x: giantCheese.w + 10,
                        y: dog.y - 120 + (Math.random() * 40),
                        vx: 1 + Math.random() * 1.5,
                        vy: -10 - Math.random() * 5,
                        radius: 12
                    });

                    let kickColor = level === 1 ? '#FCD34D' : (level === 2 ? '#93C5FD' : '#F9A8D4');
                    createParticles(giantCheese.w, tailY, kickColor, 5);
                }
            }

            for (let i = fallingCheeses.length - 1; i >= 0; i--) {
                const c = fallingCheeses[i];
                c.vy += 0.2; c.x += c.vx; c.y += c.vy;

                const distToHead = Math.hypot(headX - c.x, headY - c.y);
                if (distToHead < c.radius + 25 && dog.facing === -1) {
                    playSound('eat'); currentLevelScore++; totalScore++; updateUI();
                    let particleColor = level === 1 ? '#FFD700' : (level === 2 ? '#60A5FA' : '#F472B6');
                    createParticles(c.x, c.y, particleColor, 10);
                    fallingCheeses.splice(i, 1);
                    if (currentLevelScore >= 10) { handleLevelComplete(); }
                    continue;
                }

                if (c.y >= groundY + 10) {
                    playSound('smash');
                    let smashColor = level === 1 ? '#FBBF24' : (level === 2 ? '#3B82F6' : '#FBCFE8');
                    createParticles(c.x, groundY + 10, smashColor, 8);
                    fallingCheeses.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            if (giantCheese.shakeTimer > 0) giantCheese.shakeTimer--;
            frameCount++;
        }

        function draw() {
            ctx.fillStyle = '#bae6fd'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(200 + (frameCount*0.2)%800, 100, 40, 0, Math.PI*2);
            ctx.arc(240 + (frameCount*0.2)%800, 100, 50, 0, Math.PI*2);
            ctx.arc(280 + (frameCount*0.2)%800, 120, 30, 0, Math.PI*2);
            ctx.fill();

            ctx.fillStyle = '#4ade80'; ctx.fillRect(0, groundY + 10, canvas.width, canvas.height - groundY);
            ctx.fillStyle = '#16a34a'; ctx.fillRect(0, groundY + 10, canvas.width, 10);

            ctx.save();
            let cheeseShakeX = giantCheese.shakeTimer > 0 ? (Math.random() - 0.5) * 8 : 0;
            
            if (level === 1) {
                ctx.fillStyle = '#FBBF24'; ctx.fillRect(giantCheese.x + cheeseShakeX, giantCheese.y, giantCheese.w, giantCheese.h);
                ctx.fillStyle = '#D97706';
                [[20, 150, 15], [50, 220, 25], [25, 310, 20], [60, 380, 15], [30, 450, 22]].forEach(h => {
                    ctx.beginPath(); ctx.arc(giantCheese.x + cheeseShakeX + h[0], h[1], h[2], 0, Math.PI*2); ctx.fill();
                });
            } else if (level === 2) {
                ctx.fillStyle = '#60A5FA'; ctx.fillRect(giantCheese.x + cheeseShakeX, giantCheese.y, giantCheese.w, giantCheese.h);
                ctx.fillStyle = '#1E3A8A';
                [[20, 150, 15], [50, 220, 25], [25, 310, 20], [60, 380, 15], [30, 450, 22]].forEach(h => {
                    ctx.beginPath(); ctx.arc(giantCheese.x + cheeseShakeX + h[0], h[1], h[2], 0, Math.PI*2); ctx.fill();
                });
            } else if (level === 3) {
                ctx.fillStyle = '#FBCFE8'; ctx.fillRect(giantCheese.x + cheeseShakeX, giantCheese.y, giantCheese.w, giantCheese.h);
                ctx.fillStyle = '#F472B6';
                for(let i=0; i<5; i++) {
                    ctx.fillRect(giantCheese.x + cheeseShakeX, giantCheese.y + 50 + i*80, giantCheese.w, 20);
                }
            }
            ctx.restore();

            ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            fallingCheeses.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y); ctx.rotate(frameCount * 0.1);
                if (level === 1) { ctx.fillText('🧀', 0, 0); } 
                else if (level === 2) { ctx.filter = 'hue-rotate(180deg)'; ctx.fillText('🧀', 0, 0); ctx.filter = 'none'; } 
                else if (level === 3) { ctx.fillText('🍰', 0, 0); }
                ctx.restore();
            });

            ctx.save();
            ctx.translate(dog.x, dog.y);
            if (!dog.isGrounded) { ctx.rotate(dog.facing * -0.2); } 
            else if (dog.kickCooldown > 20) { ctx.rotate(dog.facing * 0.3); } 
            else if (Math.abs(dog.vx) > 0) { ctx.translate(0, Math.sin(frameCount * 0.5) * 3); }

            if (dog.facing === 1) ctx.scale(-1, 1);
            ctx.font = '60px Arial'; ctx.textAlign = 'center'; ctx.fillText('🐕', 0, 10); 
            ctx.restore();

            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life / 35;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }

        function gameLoop() {
            if (!isPlaying) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        showMainMenu();
    </script>
</body>
</html>
